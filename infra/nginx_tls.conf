# infra/nginx_tls.conf — Production Nginx config with TLS (Let's Encrypt)
#
# Usage:
#   1. Run  infra/setup-tls.sh  to obtain certs via Certbot
#   2. Replace nginx.conf with this file (or mount as volume)
#   3. Restart nginx
#
# Cert paths default to Let's Encrypt standard locations.

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    large_client_header_buffers 4 32k;
    proxy_buffer_size 16k;
    proxy_buffers 4 16k;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend_api { server backend-api:4000; }
    upstream app_dashboard { server frontend-dashboard:3000; }
    upstream admin_dashboard { server admin-dashboard:3000; }
    upstream marketing_site { server frontend-marketing:3000; }

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME challenge for Let's Encrypt renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ───────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS (uncomment after confirming TLS works)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Shared proxy settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # NextAuth routes
        location /api/auth/ {
            proxy_pass http://marketing_site/api/auth/;
        }

        # WebSocket log stream
        location /api/ws/ {
            proxy_pass http://backend_api/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend_api/;
        }

        # Admin Dashboard
        location /admin {
            proxy_pass http://admin_dashboard;
        }
        location /admin/_next/ {
            proxy_pass http://admin_dashboard;
        }

        # App Dashboard
        location /app {
            proxy_pass http://app_dashboard;
        }
        location /app/_next/ {
            proxy_pass http://app_dashboard;
        }

        # Marketing static assets
        location /_next/ {
            proxy_pass http://marketing_site;
        }

        # Marketing pages (root)
        location / {
            proxy_pass http://marketing_site;
        }
    }
}
