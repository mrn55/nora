services:
  nginx:
    image: nginx:latest
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./${NGINX_CONFIG_FILE:-nginx.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-api:
        condition: service_healthy

  frontend-marketing:
    build:
      context: .
      dockerfile: frontend-marketing/Dockerfile
    working_dir: /app
    volumes:
      - ./frontend-marketing:/app
      - ./tsconfig.base.json:/tsconfig.base.json:ro
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - PLATFORM_MODE=${PLATFORM_MODE:-selfhosted}
    env_file:
      - ${NORA_ENV_FILE:-.env}

  frontend-dashboard:
    build:
      context: .
      dockerfile: frontend-dashboard/Dockerfile
    working_dir: /app
    volumes:
      - ./frontend-dashboard:/app
      - ./tsconfig.base.json:/tsconfig.base.json:ro
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=3000
      - NODE_ENV=development

  admin-dashboard:
    build:
      context: .
      dockerfile: admin-dashboard/Dockerfile
    working_dir: /app
    volumes:
      - ./admin-dashboard:/app
      - ./tsconfig.base.json:/tsconfig.base.json:ro
    command: sh -c "npm install && npm run dev"
    environment:
      - PORT=3000
      - NODE_ENV=development

  backend-api:
    build:
      context: .
      dockerfile: backend-api/Dockerfile
    working_dir: /app
    volumes:
      - ./backend-api:/app
      - ./workers/provisioner/backends:/app/backends
      - ./agent-runtime:/agent-runtime:ro
      - ./tsconfig.base.json:/tsconfig.base.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "npm install && npm start"
    ports:
      - "127.0.0.1:${BACKEND_API_PORT:-4100}:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${NORA_ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker-provisioner:
    build:
      context: .
      dockerfile: workers/provisioner/Dockerfile
    working_dir: /app
    volumes:
      - ./workers/provisioner:/app
      - ./agent-runtime:/agent-runtime:ro
      - ./backend-api:/backend-api:ro
      - ./tsconfig.base.json:/tsconfig.base.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: sh -c "npm install && npm start"
    environment:
      DEPLOYMENT_WORKER_CONCURRENCY: ${DEPLOYMENT_WORKER_CONCURRENCY:-6}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${NORA_ENV_FILE:-.env}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-nora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nora}
      POSTGRES_DB: ${DB_NAME:-nora}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend-api/db_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # On-demand backup - run with: docker compose run --rm backup
  backup:
    build:
      context: ./infra
      dockerfile: Dockerfile.backup
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${DB_USER:-nora}
      PGPASSWORD: ${DB_PASSWORD:-nora}
      PGDATABASE: ${DB_NAME:-nora}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - backup

volumes:
  pgdata:
  backups:
