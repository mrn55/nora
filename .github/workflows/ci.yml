name: Nora CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  frontend-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - admin-dashboard
          - frontend-dashboard
          - frontend-marketing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.package }}
      - run: npm run typecheck
        working-directory: ${{ matrix.package }}
      - run: npm run build
        working-directory: ${{ matrix.package }}

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend-api/package-lock.json
            workers/provisioner/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: workers/provisioner
      - run: npm run typecheck
      - run: npm run typecheck
        working-directory: workers/provisioner
      - run: npm test

  runtime-typechecks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - agent-runtime
          - e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.package }}
      - run: npm run typecheck
        working-directory: ${{ matrix.package }}

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      - run: npm ci
        working-directory: e2e
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      - run: npm test
        working-directory: e2e

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml -f docker-compose.override.yml build admin-dashboard frontend-dashboard frontend-marketing backend-api worker-provisioner
